<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
:root {
  --bg: #05080f;
  --bg2: #05080f;
  --surface: #0c1220;
  --surface2: #101a2e;
  --surface3: #152038;
  --panel: #0c1220;
  --panel2: #101a2e;
  --panel3: #152038;
  --border: #1b3a5e;
  --line: #1b3a5e;
  --line2: #1b3a5e;
  --border2: #1b3a5e;
  --accent: #155e2a;
  --accent-b: #22a050;
  --accent-l: #22a050;
  --accent-glow: rgba(26,160,80,.22);
  --accent-dim: rgba(26,160,80,.12);
  --green-acc: #155e2a;
  --blue-b: #22a050;
  --blue-l: #22a050;
  --blue-dim: rgba(26,160,80,.12);
  --gold: #1a7a3a;
  --gold-l: #1a7a3a;
  --gold-dim: rgba(201,170,77,.15);
  --text: #dce8f4;
  --text2: #445e7a;
  --text3: #2d4260;
  --muted: #445e7a;
  --danger: #c0392b;
  --danger-l: #e74c3c;
  --red: #c0392b;
  --red-l: #e74c3c;
  --red-dim: rgba(192,57,43,.12);
  --success: #1e9e56;
  --green: #1e9e56;
  --green-l: #1e9e56;
  --green-dim: rgba(30,158,86,.12);
  --warning: #d68910;
  --amber: #d68910;
  --amber-l: #d68910;
  --amber-dim: rgba(214,137,16,.12);
  --purple: #7d3c98;
  --purple-l: #bf7df0;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Rajdhani', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
</style>
  <link rel="icon" type="image/png" href="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCSO — Officiers</title>
  <link rel="stylesheet" href="style.css?v=14">
  <style>
    .officers-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
    .officer-card { background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; transition:all .2s; animation:fadeIn .3s ease both; }

    .officer-card:hover { border-color:var(--accent); box-shadow:0 0 16px rgba(34,197,94,.15); transform:translateY(-2px); }
    .oc-header { display:flex; gap:14px; align-items:center; padding:16px; }
    .oc-photo { width:60px; height:60px; border-radius:50%; border:2px solid var(--line); background:var(--panel2); display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0; overflow:hidden; }
    .oc-photo img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .oc-name { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:700; letter-spacing:1px; margin-bottom:4px; }
    .oc-grade { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--accent-b); letter-spacing:1px; margin-bottom:4px; }
    .oc-body { padding:0 16px 14px; border-top:1px solid var(--line); padding-top:12px; }
    .oc-row { display:flex; justify-content:space-between; margin-bottom:6px; font-size:12px; }
    .oc-lbl { color:var(--text2); font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:1px; }
    .oc-actions { display:flex; gap:6px; padding:10px 16px; border-top:1px solid var(--line); }
    .oc-actions button { flex:1; }
    .locked-overlay { position:absolute; inset:0; background:rgba(5,8,15,.7); display:flex; align-items:center; justify-content:center; border-radius:10px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text2); letter-spacing:2px; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }

    /* GRADE BADGE COLORS */
    .grade-or { color:var(--gold); }
    .grade-bleu { color:var(--accent-b); }
    .grade-gris { color:var(--text2); }
  </style>

<body>
<div class="app-shell">
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="topbar">
  <div class="tb-left">
    <button class="tb-menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="tb-brand">
      <div class="tb-shield"></div>
      <img class="tb-logo" src="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png" alt="BCSO" onerror="this.style.display='none'">
      <div class="tb-title">B.C.S.O</div>
    </div>
    <div class="tb-page">Officiers</div>
  </div>
  <div class="tb-right">
    <div class="tb-status"><div class="live-dot"></div>En ligne</div>
    <div class="tb-time" id="tbClock">--:--:--</div>
    <div class="tb-user">
      <span class="tb-grade" id="tbGrade">—</span>
      <span class="tb-name" id="tbName">Deputy</span>
    </div>
    <button class="btn-out" onclick="logout()">Quitter</button>
  </div>
</div>
<div class="shell">
    <div class="sidebar" id="sidebar"></div>
    <div class="main">

      <div class="page-head">
        <div class="page-head-left">
          <h2>GESTION DES OFFICIERS</h2>
          <p>// PERSONNEL DU DÉPARTEMENT — LOS SANTOS POLICE DEPARTMENT</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="captureModal('detailBody')">📸 Capturer</button>
          <button class="btn btn-primary" id="btnNew" style="display:none">+ Ajouter officier</button>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats-grid" style="grid-template-columns:repeat(2,1fr)">
        <div class="stat-box blue"><div class="stat-lbl">TOTAL OFFICIERS</div><div class="stat-val" id="sTotal">—</div></div>
        <div class="stat-box green"><div class="stat-lbl">EN LIGNE</div><div class="stat-val" id="sEnLigne">—</div></div>
      </div>

      <!-- TABS + SEARCH -->
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn btn-primary btn-sm" id="tabGrid" onclick="setView('grid',this)">⊞ Cartes</button>
        <button class="btn btn-ghost btn-sm" id="tabList" onclick="setView('list',this)">☰ Liste</button>
      </div>

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Rechercher par nom, grade, matricule..." oninput="filterOfficiers()">

        <select id="filterGrade" onchange="filterOfficiers()">
          <option value="">Tous les grades</option>
          <option>Shérif</option><option>Shérif Adjoint Principal</option>
          <option>Shérif Adjoint</option><option>Commandant</option>
          <option>Capitaine</option><option>Lieutenant</option>
          <option>Sergent</option><option>Deputy</option><option>Stagiaire</option>
        </select>
      </div>

      <!-- GRID -->
      <div id="viewGrid">
        <div class="officers-grid" id="officersGrid">
          <div class="empty-state"><div class="ei">👮</div><p>CHARGEMENT...</p></div>
        </div>
      </div>

      <!-- LIST -->
      <div id="viewList" style="display:none">
        <div class="card">
          <div class="card-body" style="padding:0">
            <div class="table-wrap">
              <table>
                <thead><tr><th>PHOTO</th><th>NOM</th><th>GRADE</th><th>MATRICULE</th><th>SPÉCIALITÉ</th><th>STATUT</th><th>ENTRÉE</th><th>ACTIONS</th></tr></thead>
                <tbody id="officersList"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL FORM -->
<div class="modal-bg" id="modalOfficier">
  <div class="modal" style="max-width:650px">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">AJOUTER UN OFFICIER</div>
      <button class="modal-close" onclick="closeModal('modalOfficier')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid g2" style="margin-bottom:12px">
        <div class="fg"><label>Nom complet</label><input id="oNom" placeholder="Prénom NOM"></div>
        <div class="fg"><label>Matricule</label><input id="oMatricule" placeholder="ex: BCSO-0042"></div>
        <div class="fg"><label>Grade</label>
          <select id="oGrade">
            <option>Shérif</option><option>Shérif Adjoint Principal</option>
            <option>Shérif Adjoint</option><option>Commandant</option>
            <option>Capitaine</option><option>Lieutenant</option>
            <option>Sergent</option><option>Deputy</option><option>Stagiaire</option>
          </select>
        </div>
        <div class="fg"><label>Spécialité</label>
          <select id="oSpec">
            <option>Patrouille</option><option>SWAT</option>
            <option>Circulation</option><option>Détective</option>
            <option>Sous-cover</option><option>K9</option><option>Autre</option>
          </select>
        </div>
        <div class="fg"><label>Statut</label>
          <select id="oStatut">
            <option>Actif</option><option>Hors service</option>
            <option>Congé</option><option>Suspendu</option>
          </select>
        </div>
        <div class="fg"><label>Date d'entrée</label><input type="date" id="oDate"></div>
        <div class="fg"><label>Email</label><input type="email" id="oEmail" placeholder="officier@bcso.gov"></div>
        <div class="fg"><label>Photo URL</label><input id="oPhoto" placeholder="https://..."></div>
        <div class="fg"><label>UID Firebase (optionnel)</label><input id="oUid" placeholder="ex: 7hMrwe..."></div>
      </div>
      <div class="fg"><label>Notes (dossier complet)</label><textarea id="oNotes" style="min-height:80px" placeholder="Informations confidentielles — visible uniquement par les grades supérieurs..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalOfficier')">Annuler</button>
      <button class="btn btn-primary" onclick="saveOfficier()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL DETAIL -->
<div class="modal-bg" id="modalDetail">
  <div class="modal" style="max-width:600px">
    <div class="modal-head">
      <div class="modal-title" id="detailTitle">FICHE OFFICIER</div>
      <button class="modal-close" onclick="closeModal('modalDetail')">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { initPage, startClock, showToast, openModal, closeModal, setupModalClose, statusBadge, addLog, getPerms, captureModal } from './utils.js?v=3';

  const firebaseConfig = {
    apiKey: "AIzaSyDTrqTkudkB4gM6tZlTDcDPTGk2gvi713Y",
    authDomain: "bcso-intranet-2aed9.firebaseapp.com",
    projectId: "bcso-intranet-2aed9",
    storageBucket: "bcso-intranet-2aed9.firebasestorage.app",
    messagingSenderId: "251172788920",
    appId: "1:251172788920:web:a32d5e89bcff75bd8b3547"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let allOfficiers = [];
  let onlineUsers = [];
  let editingId = null;
  let userGrade = 'cadet';
  let userPerms = {};

  startClock('tbClock');
  setupModalClose();
  window.closeModal = closeModal;
  window.captureModal = captureModal;

  initPage(auth, db, onAuthStateChanged, 'officiers').then(async ({ grade, name, perms }) => {
    userGrade = grade;
    userPerms = perms;

    // Bouton ajouter — seulement Capitaine et plus
    if (perms.canWrite && perms.canManageOfficers && perms.canEditOfficiers !== false) {
      document.getElementById('btnNew').style.display = '';
      document.getElementById('btnNew').addEventListener('click', () => newOfficier());
    }

    document.getElementById('oDate').value = new Date().toISOString().split('T')[0];
    await loadOfficiers();
    listenOnline();
  });

  // Écoute en temps réel qui est connecté
  function listenOnline() {
    onSnapshot(collection(db, 'online'), snap => {
      const now = new Date();
      onlineUsers = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(u => {
          if (!u.lastSeen) return true;
          return (now - new Date(u.lastSeen)) < 10 * 60 * 1000;
        });
      const enLigneEl = document.getElementById('sEnLigne');
      if (enLigneEl) enLigneEl.textContent = onlineUsers.length;
      renderAll(allOfficiers);
    });
  }

  async function loadOfficiers() {
    try {
      const snap = await getDocs(query(collection(db, 'officiers'), orderBy('nom')));
      allOfficiers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      document.getElementById('sTotal').textContent = allOfficiers.length;
      renderAll(allOfficiers);
    } catch(e) { console.error(e); }
  }

  function gradeColor(g) {
    const hauts = ['shérif','shérif adjoint principal','shérif adjoint','commandant','capitaine'];
    const moyens = ['lieutenant','sergent','officier'];
    const gl = (g||'').toLowerCase();
    if (hauts.includes(gl)) return 'var(--gold)';
    if (moyens.includes(gl)) return 'var(--blue-b)';
    return 'var(--text2)';
  }

  function statutClass(s) {
    if (s==='Actif') return 'actif';
    if (s==='Congé') return 'conge';
    if (s==='Suspendu') return 'suspendu';
    return 'inactif';
  }

  function renderAll(list) {
    renderGrid(list);
    renderList(list);
  }

  function renderGrid(list) {
    const grid = document.getElementById('officersGrid');
    if (!list.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="ei">👮</div><p>AUCUN OFFICIER</p></div>'; return; }
    grid.innerHTML = list.map(o => { const isOnline = onlineUsers.some(u => (u.displayName||'').toLowerCase().trim() === (o.nom||'').toLowerCase().trim()); return `
      <div class="officer-card" style="border-color:${isOnline ? 'var(--green)' : 'var(--line)'}; box-shadow:${isOnline ? '0 0 16px rgba(30,158,86,.3)' : 'none'}">
        <div class="oc-header">
          <div class="oc-photo">
            ${o.photoUrl?`<img src="${o.photoUrl}" onerror="this.parentNode.innerHTML='👮'">`:'👮'}
          </div>
          <div style="flex:1;min-width:0">
            <div class="oc-name">${o.nom||'—'}</div>
            <div class="oc-grade" style="color:${gradeColor(o.grade)}">${o.grade||'—'}</div>
            <div style="margin-top:4px">
              ${isOnline 
                ? '<span style="display:flex;align-items:center;gap:4px;font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--green)"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s infinite"></span>En ligne</span>'
                : '<span style="display:flex;align-items:center;gap:4px;font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--text2)"><span style="width:8px;height:8px;border-radius:50%;background:var(--text2);display:inline-block"></span>Hors service</span>'}
            </div>
          </div>
        </div>
        <div class="oc-body">
          <div class="oc-row"><span class="oc-lbl">MATRICULE</span><span style="font-family:'IBM Plex Mono',monospace;font-size:12px">${o.matricule||'—'}</span></div>
          <div class="oc-row"><span class="oc-lbl">SPÉCIALITÉ</span><span style="font-size:12px">${o.specialite||'—'}</span></div>
          <div class="oc-row"><span class="oc-lbl">ENTRÉE</span><span style="font-family:'IBM Plex Mono',monospace;font-size:11px">${o.dateEntree||'—'}</span></div>
        </div>
        <div class="oc-actions">
          <button class="btn btn-ghost btn-sm" onclick="viewOfficier('${o.id}')">👁️ Voir</button>
          ${userPerms.canWrite && userPerms.canEditOfficiers !== false?`<button class="btn btn-ghost btn-sm" onclick="editOfficier('${o.id}')">✏️</button>`:''}
          ${userPerms.canDelete?`<button class="btn btn-danger btn-sm" onclick="deleteOfficier('${o.id}')">🗑️</button>`:''}
        </div>
      </div>`; }).join('');
  }

  function renderList(list) {
    const tb = document.getElementById('officersList');
    if (!list.length) { tb.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="ei">👮</div><p>AUCUN OFFICIER</p></div></td></tr>'; return; }
    tb.innerHTML = list.map(o => {
      const isOnline = onlineUsers.some(u => (u.displayName||'').toLowerCase().trim() === (o.nom||'').toLowerCase().trim() || (o.uid && u.uid === o.uid));
      return `
      <tr>
        <td>${o.photoUrl?`<img src="${o.photoUrl}" style="width:36px;height:36px;border-radius:50%;object-fit:cover" onerror="this.outerHTML='<span style=font-size:20px>👮</span>'">`:'<span style="font-size:20px">👮</span>'}</td>
        <td><strong>${o.nom||'—'}</strong></td>
        <td style="font-size:12px;font-weight:700;color:${gradeColor(o.grade)}">${o.grade||'—'}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${o.matricule||'—'}</td>
        <td style="font-size:12px">${o.specialite||'—'}</td>
        <td>${statusBadge(o.statut)}</td>
        <td>${isOnline
          ? '<span style="display:flex;align-items:center;gap:4px;font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--green)"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>En ligne</span>'
          : '<span style="display:flex;align-items:center;gap:4px;font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--text2)"><span style="width:8px;height:8px;border-radius:50%;background:var(--text2);display:inline-block"></span>Hors service</span>'}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${o.dateEntree||'—'}</td>
        <td style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-sm" onclick="viewOfficier('${o.id}')">👁️</button>
          ${userPerms.canWrite && userPerms.canEditOfficiers !== false?`<button class="btn btn-ghost btn-sm" onclick="editOfficier('${o.id}')">✏️</button>`:''}
          ${userPerms.canDelete?`<button class="btn btn-danger btn-sm" onclick="deleteOfficier('${o.id}')">🗑️</button>`:''}
        </td>
      </tr>`;}).join('');
  }

  window.filterOfficiers = function() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const g = document.getElementById('filterGrade').value;
    renderAll(allOfficiers.filter(o =>
      (o.nom+' '+o.grade+' '+o.matricule).toLowerCase().includes(q) &&
(!g||o.grade===g)
    ));
  };

  window.setView = function(v, btn) {
    document.getElementById('viewGrid').style.display = v==='grid'?'block':'none';
    document.getElementById('viewList').style.display = v==='list'?'block':'none';
    document.getElementById('tabGrid').className = v==='grid'?'btn btn-primary btn-sm':'btn btn-ghost btn-sm';
    document.getElementById('tabList').className = v==='list'?'btn btn-primary btn-sm':'btn btn-ghost btn-sm';
  };

  window.viewOfficier = function(id) {
    const o = allOfficiers.find(x=>x.id===id);
    if (!o) return;
    document.getElementById('detailTitle').textContent = o.nom||'OFFICIER';

    // Infos de base — visibles par TOUS
    let html = `
      <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px">
        <div style="width:88px;height:88px;border-radius:50%;overflow:hidden;border:3px solid var(--line);flex-shrink:0;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:36px">
          ${o.photoUrl?`<img src="${o.photoUrl}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.innerHTML='👮'">`:'👮'}
        </div>
        <div style="flex:1">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:700;margin-bottom:5px">${o.nom||'—'}</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:${gradeColor(o.grade)};margin-bottom:8px">${o.grade||'—'}</div>
          <div style="display:flex;gap:6px">${statusBadge(o.statut)}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:2px;margin-bottom:3px">MATRICULE</div><div style="font-family:'IBM Plex Mono',monospace;font-size:13px">${o.matricule||'—'}</div></div>
        <div><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:2px;margin-bottom:3px">SPÉCIALITÉ</div><div style="font-size:13px">${o.specialite||'—'}</div></div>
        <div><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:2px;margin-bottom:3px">DATE D'ENTRÉE</div><div style="font-family:'IBM Plex Mono',monospace;font-size:13px">${o.dateEntree||'—'}</div></div>
      </div>`;

    // Dossier complet — visible seulement par les grades avec canViewOfficierDossier
    if (userPerms.canViewOfficierDossier) {
      html += `
        <div style="background:rgba(201,170,77,.06);border:1px solid rgba(201,170,77,.2);border-radius:8px;padding:14px;margin-top:8px">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:3px;margin-bottom:12px">🔒 DOSSIER CONFIDENTIEL</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
            <div><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:2px;margin-bottom:3px">EMAIL</div><div style="font-size:13px;color:var(--accent-b)">${o.email||'—'}</div></div>
          </div>
          ${o.notes?`<div><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:2px;margin-bottom:6px">NOTES INTERNES</div><div style="font-size:13px;padding:10px;background:var(--panel2);border-radius:5px;line-height:1.6">${o.notes}</div></div>`:''}
        </div>`;
    } else {
      html += `
        <div style="background:rgba(68,94,122,.08);border:1px solid var(--line);border-radius:8px;padding:14px;margin-top:8px;text-align:center">
          <div style="font-size:24px;margin-bottom:6px">🔒</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:2px">DOSSIER CONFIDENTIEL — ACCÈS RESTREINT</div>
          <div style="font-size:11px;color:var(--text2);margin-top:4px">Grade insuffisant pour voir les informations complètes</div>
        </div>`;
    }

    document.getElementById('detailBody').innerHTML = html;
    document.getElementById('detailFooter').innerHTML = `
      <button class="btn btn-ghost" onclick="closeModal('modalDetail')">Fermer</button>
      ${userPerms.canWrite && userPerms.canEditOfficiers !== false?`<button class="btn btn-primary" onclick="closeModal('modalDetail');editOfficier('${o.id}')">✏️ Modifier</button>`:''}
    `;
    openModal('modalDetail');
  };

  function newOfficier() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'AJOUTER UN OFFICIER';
    ['oNom','oMatricule','oEmail','oPhoto','oNotes'].forEach(id => document.getElementById(id).value='');
    document.getElementById('oGrade').value = 'Officier';
    document.getElementById('oSpec').value = 'Patrouille';
    document.getElementById('oStatut').value = 'Actif';
    openModal('modalOfficier');
  }

  window.editOfficier = function(id) {
    const o = allOfficiers.find(x=>x.id===id);
    if (!o) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'MODIFIER OFFICIER';
    document.getElementById('oNom').value = o.nom||'';
    document.getElementById('oMatricule').value = o.matricule||'';
    document.getElementById('oGrade').value = o.grade||'Officier';
    document.getElementById('oSpec').value = o.specialite||'Patrouille';
    document.getElementById('oStatut').value = o.statut||'Actif';
    document.getElementById('oDate').value = o.dateEntree||'';
    document.getElementById('oEmail').value = o.email||'';
    document.getElementById('oPhoto').value = o.photoUrl||'';
    document.getElementById('oUid').value = o.uid||'';
    document.getElementById('oNotes').value = o.notes||'';
    openModal('modalOfficier');
  };

  window.saveOfficier = async function() {
    const nom = document.getElementById('oNom').value.trim();
    if (!nom) { showToast('Le nom est obligatoire','error'); return; }
    const payload = {
      nom, uid: document.getElementById('oUid').value,
      matricule: document.getElementById('oMatricule').value,
      grade: document.getElementById('oGrade').value,
      specialite: document.getElementById('oSpec').value,
      statut: document.getElementById('oStatut').value,
      dateEntree: document.getElementById('oDate').value,
      email: document.getElementById('oEmail').value,
      photoUrl: document.getElementById('oPhoto').value,
      notes: document.getElementById('oNotes').value,
      updatedAt: new Date().toISOString()
    };
    try {
      if (editingId) {
        await updateDoc(doc(db,'officiers',editingId), payload);
        await addLog(db,'Officier modifié',nom);
        showToast('Officier mis à jour','success');
      } else {
        payload.createdAt = new Date().toISOString();
        await addDoc(collection(db,'officiers'), payload);
        await addLog(db,'Officier ajouté',nom);
        showToast('Officier ajouté','success');
      }
      closeModal('modalOfficier'); editingId = null;
      await loadOfficiers();
    } catch(e) { showToast('Erreur: '+e.message,'error'); }
  };

  window.deleteOfficier = async function(id) {
    if (!confirm('Supprimer cet officier ?')) return;
    const o = allOfficiers.find(x=>x.id===id);
    await deleteDoc(doc(db,'officiers',id));
    await addLog(db,'Officier supprimé',o?.nom||'');
    await loadOfficiers();
    showToast('Officier supprimé','success');
  };

  window.logout = async function() {
    try {
      const user = auth.currentUser;
      if (user) {
        await deleteDoc(doc(db, 'online', user.uid));
      }
    } catch(e) { console.warn('Logout online removal failed:', e); }
    await signOut(auth);
    sessionStorage.clear();
    window.location.href = 'index.html';
  };
</script>

</body>
</html>
