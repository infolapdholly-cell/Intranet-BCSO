<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
:root {
  --bg: #05080f;
  --bg2: #05080f;
  --surface: #0c1220;
  --surface2: #101a2e;
  --surface3: #152038;
  --panel: #0c1220;
  --panel2: #101a2e;
  --panel3: #152038;
  --border: #1b3a5e;
  --line: #1b3a5e;
  --line2: #1b3a5e;
  --border2: #1b3a5e;
  --accent: #155e2a;
  --accent-b: #22a050;
  --accent-l: #22a050;
  --accent-glow: rgba(26,160,80,.22);
  --accent-dim: rgba(26,160,80,.12);
  --green-acc: #155e2a;
  --blue-b: #22a050;
  --blue-l: #22a050;
  --blue-dim: rgba(26,160,80,.12);
  --gold: #1a7a3a;
  --gold-l: #1a7a3a;
  --gold-dim: rgba(201,170,77,.15);
  --text: #dce8f4;
  --text2: #445e7a;
  --text3: #2d4260;
  --muted: #445e7a;
  --danger: #c0392b;
  --danger-l: #e74c3c;
  --red: #c0392b;
  --red-l: #e74c3c;
  --red-dim: rgba(192,57,43,.12);
  --success: #1e9e56;
  --green: #1e9e56;
  --green-l: #1e9e56;
  --green-dim: rgba(30,158,86,.12);
  --warning: #d68910;
  --amber: #d68910;
  --amber-l: #d68910;
  --amber-dim: rgba(214,137,16,.12);
  --purple: #7d3c98;
  --purple-l: #bf7df0;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Rajdhani', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
</style>
  <link rel="icon" type="image/png" href="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCSO — Véhicules</title>
  <link rel="stylesheet" href="style.css?v=14">
  <style>
    .veh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
    .veh-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;transition:all .2s;animation:fadeIn .3s ease both;}
    .veh-card::before{content:'';display:block;height:3px;}
    .veh-card.dispo::before{background:var(--green);}
    .veh-card.service::before{background:var(--blue-b);}
    .veh-card.maint::before{background:var(--amber-l);}
    .veh-card.hors::before{background:var(--red);}
    .veh-card:hover{border-color:var(--accent);box-shadow:0 0 16px rgba(34,197,94,.15);transform:translateY(-2px);}
    .veh-icon{font-size:48px;text-align:center;padding:18px 0 8px;}
    .veh-plaque{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;letter-spacing:3px;text-align:center;margin-bottom:4px;}
    .veh-modele{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);text-align:center;margin-bottom:12px;letter-spacing:1px;}
    .veh-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;padding-bottom:6px;border-bottom:1px solid rgba(27,58,94,.3);}
    .veh-row:last-child{border-bottom:none;}
    .veh-lbl{color:var(--text2);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;}
    .veh-body{padding:0 16px 14px;}
    .veh-actions{display:flex;gap:6px;padding:10px 16px;border-top:1px solid var(--line);}
    .veh-actions button{flex:1;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  </style>
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BCSO">
  <meta name="theme-color" content="#16a34a">
  <link rel="apple-touch-icon" href="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png">
</head>
<body>
<div class="app-shell">
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="topbar">
  <div class="tb-left">
    <button class="tb-menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="tb-brand">
      <div class="tb-shield"></div>
      <img class="tb-logo" src="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png" alt="BCSO" onerror="this.style.display='none'">
      <div class="tb-title">B.C.S.O</div>
    </div>
    <div class="tb-page">Véhicules</div>
  </div>
  <div class="tb-right">
    <div class="tb-status"><div class="live-dot"></div>En ligne</div>
    <div class="tb-time" id="tbClock">--:--:--</div>
    <div class="tb-user">
      <span class="tb-grade" id="tbGrade">—</span>
      <span class="tb-name" id="tbName">Officier</span>
    </div>
    <button class="btn-out" onclick="logout()">Quitter</button>
  </div>
</div>
<div class="shell">
    <div class="sidebar" id="sidebar"></div>
    <div class="main">
      <div class="page-head">
        <div class="page-head-left"><h2>PARC AUTOMOBILE</h2><p>// VÉHICULES DE SERVICE — LOS SANTOS POLICE DEPARTMENT</p></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="window.print()">📋 Imprimer liste</button>
          <button class="btn btn-primary" id="btnNew" style="display:none">+ Ajouter véhicule</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-box blue"><div class="stat-lbl">TOTAL</div><div class="stat-val" id="sTotal">—</div></div>
        <div class="stat-box green"><div class="stat-lbl">DISPONIBLES</div><div class="stat-val" id="sDispo">—</div></div>
        <div class="stat-box gold"><div class="stat-lbl">EN SERVICE</div><div class="stat-val" id="sService">—</div></div>
        <div class="stat-box red"><div class="stat-lbl">MAINTENANCE</div><div class="stat-val" id="sMaint">—</div></div>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn btn-primary btn-sm" id="tabGrid" onclick="setView('grid',this)">⊞ Cartes</button>
        <button class="btn btn-ghost btn-sm" id="tabList" onclick="setView('list',this)">☰ Liste</button>
      </div>

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Rechercher par plaque, modèle, assigné..." oninput="filterVehicules()">
        <select id="filterType" onchange="filterVehicules()">
          <option value="">Tous les types</option>
          <option>Patrouille</option><option>SWAT</option><option>Banalisé</option>
          <option>Moto</option><option>Hélicoptère</option><option>Bateau</option><option>Fourgon</option>
        </select>
        <select id="filterStatut" onchange="filterVehicules()">
          <option value="">Tous les statuts</option>
          <option>Disponible</option><option>En service</option>
          <option>Maintenance</option><option>Hors service</option>
        </select>
      </div>

      <div id="viewGrid"><div class="veh-grid" id="vehiculesGrid"><div class="empty-state"><div class="ei">🚓</div><p>CHARGEMENT...</p></div></div></div>
      <div id="viewList" style="display:none">
        <div class="card"><div class="card-body" style="padding:0"><div class="table-wrap">
          <table>
            <thead><tr><th>TYPE</th><th>PLAQUE</th><th>MODÈLE</th><th>ASSIGNÉ</th><th>STATUT</th><th>NOTES</th><th>ACTIONS</th></tr></thead>
            <tbody id="vehiculesList"></tbody>
          </table>
        </div></div></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalVehicule">
  <div class="modal" style="max-width:600px">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">AJOUTER UN VÉHICULE</div>
      <button class="modal-close" onclick="closeModal('modalVehicule')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid g2" style="margin-bottom:12px">
        <div class="fg"><label>Plaque</label><input id="vPlaque" placeholder="ex: BCSO-042"></div>
        <div class="fg"><label>Modèle</label><input id="vModele" placeholder="ex: Ford Explorer"></div>
        <div class="fg"><label>Type</label>
          <select id="vType"><option>Patrouille</option><option>SWAT</option><option>Banalisé</option><option>Moto</option><option>Hélicoptère</option><option>Bateau</option><option>Fourgon</option></select>
        </div>
        <div class="fg"><label>Statut</label>
          <select id="vStatut"><option>Disponible</option><option>En service</option><option>Maintenance</option><option>Hors service</option></select>
        </div>
        <div class="fg"><label>Assigné à</label><input id="vAssign" placeholder="Nom de l'officier"></div>
        <div class="fg"><label>Année / Couleur</label><input id="vAnnee" placeholder="ex: 2023 — Noir"></div>
      </div>
      <div class="fg"><label>Notes</label><textarea id="vNotes" style="min-height:70px" placeholder="État, équipements..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalVehicule')">Annuler</button>
      <button class="btn btn-primary" onclick="saveVehicule()">Enregistrer</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { initPage, startClock, showToast, openModal, closeModal, setupModalClose, statusBadge, addLog, getPerms } from './utils.js?v=3';

  const firebaseConfig = {
    apiKey: "AIzaSyDTrqTkudkB4gM6tZlTDcDPTGk2gvi713Y",
    authDomain: "bcso-intranet-60c02.firebaseapp.com",
    projectId: "bcso-intranet-60c02",
    storageBucket: "bcso-intranet-60c02.firebasestorage.app",
    messagingSenderId: "251172788920",
    appId: "1:251172788920:web:a32d5e89bcff75bd8b3547"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let allVehicules = [], editingId = null, userPerms = {};

  const TYPE_ICONS = {'Patrouille':'🚓','SWAT':'🚐','Banalisé':'🚗','Moto':'🏍','Hélicoptère':'🚁','Bateau':'🚤','Fourgon':'🚐'};
  const STATUT_CLASS = {'Disponible':'dispo','En service':'service','Maintenance':'maint','Hors service':'hors'};
  const STATUTS = ['Disponible','En service','Maintenance','Hors service'];

  startClock('tbClock');
  setupModalClose();
  window.closeModal = closeModal;

  initPage(auth, db, onAuthStateChanged, 'vehicules').then(async ({ grade, name, perms }) => {
    userPerms = perms;
    if (perms.canManageVehicles && perms.canWrite) {
      document.getElementById('btnNew').style.display = '';
      document.getElementById('btnNew').addEventListener('click', () => newVehicule());
    }
    await loadVehicules();
  });

  async function loadVehicules() {
    try {
      const snap = await getDocs(query(collection(db,'vehicules'), orderBy('plaque')));
      allVehicules = snap.docs.map(d => ({id:d.id,...d.data()}));
      document.getElementById('sTotal').textContent = allVehicules.length;
      document.getElementById('sDispo').textContent = allVehicules.filter(v=>v.statut==='Disponible').length;
      document.getElementById('sService').textContent = allVehicules.filter(v=>v.statut==='En service').length;
      document.getElementById('sMaint').textContent = allVehicules.filter(v=>v.statut==='Maintenance').length;
      renderAll(allVehicules);
    } catch(e) { console.error(e); }
  }

  function renderAll(list) { renderGrid(list); renderList(list); }

  function renderGrid(list) {
    const grid = document.getElementById('vehiculesGrid');
    if (!list.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="ei">🚓</div><p>AUCUN VÉHICULE</p></div>'; return; }
    grid.innerHTML = list.map(v => `
      <div class="veh-card ${STATUT_CLASS[v.statut]||'hors'}">
        <div class="veh-icon">${TYPE_ICONS[v.type]||'🚗'}</div>
        <div class="veh-body">
          <div class="veh-plaque">${v.plaque||'—'}</div>
          <div class="veh-modele">${v.modele||'—'}${v.annee?' · '+v.annee:''}</div>
          <div class="veh-row"><span class="veh-lbl">TYPE</span><span style="font-size:12px">${v.type||'—'}</span></div>
          <div class="veh-row"><span class="veh-lbl">STATUT</span>${statusBadge(v.statut)}</div>
          <div class="veh-row"><span class="veh-lbl">ASSIGNÉ</span><span style="font-size:12px">${v.assigne||'—'}</span></div>
          ${v.notes?`<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);margin-top:6px">${v.notes}</div>`:''}
        </div>
        <div class="veh-actions">
          ${userPerms.canWrite && userPerms.canManageVehicles ? `
            <button class="btn btn-ghost btn-sm" onclick="changeStatut('${v.id}')">🔄 Statut</button>
            <button class="btn btn-ghost btn-sm" onclick="editVehicule('${v.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteVehicule('${v.id}')">🗑️</button>
          ` : `<div style="flex:1;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2)">LECTURE SEULE</div>`}
        </div>
      </div>`).join('');
  }

  function renderList(list) {
    const tb = document.getElementById('vehiculesList');
    if (!list.length) { tb.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="ei">🚓</div><p>AUCUN VÉHICULE</p></div></td></tr>'; return; }
    tb.innerHTML = list.map(v => `
      <tr>
        <td style="font-size:20px">${TYPE_ICONS[v.type]||'🚗'}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;letter-spacing:2px">${v.plaque||'—'}</td>
        <td style="font-size:12px">${v.modele||'—'}${v.annee?' · '+v.annee:''}</td>
        <td style="font-size:12px">${v.assigne||'—'}</td>
        <td>${statusBadge(v.statut)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2)">${v.notes||'—'}</td>
        <td style="display:flex;gap:4px">
          ${userPerms.canWrite && userPerms.canManageVehicles ? `
            <button class="btn btn-ghost btn-sm" onclick="changeStatut('${v.id}')" title="Changer statut">🔄</button>
            <button class="btn btn-ghost btn-sm" onclick="editVehicule('${v.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteVehicule('${v.id}')">🗑️</button>
          ` : '—'}
        </td>
      </tr>`).join('');
  }

  window.filterVehicules = function() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const t = document.getElementById('filterType').value;
    const s = document.getElementById('filterStatut').value;
    renderAll(allVehicules.filter(v =>
      (v.plaque+' '+v.modele+' '+(v.assigne||'')).toLowerCase().includes(q) &&
      (!t||v.type===t) && (!s||v.statut===s)
    ));
  };

  window.setView = function(v, btn) {
    document.getElementById('viewGrid').style.display = v==='grid'?'block':'none';
    document.getElementById('viewList').style.display = v==='list'?'block':'none';
    document.getElementById('tabGrid').className = v==='grid'?'btn btn-primary btn-sm':'btn btn-ghost btn-sm';
    document.getElementById('tabList').className = v==='list'?'btn btn-primary btn-sm':'btn btn-ghost btn-sm';
  };

  window.changeStatut = async function(id) {
    const v = allVehicules.find(x=>x.id===id);
    if (!v) return;
    const next = STATUTS[(STATUTS.indexOf(v.statut)+1) % STATUTS.length];
    await updateDoc(doc(db,'vehicules',id), {statut:next, updatedAt:new Date().toISOString()});
    await addLog(db,'Véhicule statut',`${v.plaque} → ${next}`);
    await loadVehicules();
    showToast(`Statut → ${next}`,'success');
  };

  function newVehicule() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'AJOUTER UN VÉHICULE';
    ['vPlaque','vModele','vAssign','vAnnee','vNotes'].forEach(id => document.getElementById(id).value='');
    document.getElementById('vType').value = 'Patrouille';
    document.getElementById('vStatut').value = 'Disponible';
    openModal('modalVehicule');
  }

  window.editVehicule = function(id) {
    const v = allVehicules.find(x=>x.id===id);
    if (!v) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'MODIFIER VÉHICULE';
    document.getElementById('vPlaque').value = v.plaque||'';
    document.getElementById('vModele').value = v.modele||'';
    document.getElementById('vType').value = v.type||'Patrouille';
    document.getElementById('vStatut').value = v.statut||'Disponible';
    document.getElementById('vAssign').value = v.assigne||'';
    document.getElementById('vAnnee').value = v.annee||'';
    document.getElementById('vNotes').value = v.notes||'';
    openModal('modalVehicule');
  };

  window.saveVehicule = async function() {
    const plaque = document.getElementById('vPlaque').value.trim().toUpperCase();
    if (!plaque) { showToast('La plaque est obligatoire','error'); return; }
    const payload = {
      plaque, modele: document.getElementById('vModele').value,
      type: document.getElementById('vType').value,
      statut: document.getElementById('vStatut').value,
      assigne: document.getElementById('vAssign').value,
      annee: document.getElementById('vAnnee').value,
      notes: document.getElementById('vNotes').value,
      updatedAt: new Date().toISOString()
    };
    try {
      if (editingId) {
        await updateDoc(doc(db,'vehicules',editingId), payload);
        await addLog(db,'Véhicule modifié',plaque);
        showToast('Véhicule mis à jour','success');
      } else {
        payload.createdAt = new Date().toISOString();
        await addDoc(collection(db,'vehicules'), payload);
        await addLog(db,'Véhicule ajouté',plaque);
        showToast('Véhicule ajouté','success');
      }
      closeModal('modalVehicule'); editingId = null;
      await loadVehicules();
    } catch(e) { showToast('Erreur: '+e.message,'error'); }
  };

  window.deleteVehicule = async function(id) {
    if (!confirm('Supprimer ce véhicule ?')) return;
    const v = allVehicules.find(x=>x.id===id);
    await deleteDoc(doc(db,'vehicules',id));
    await addLog(db,'Véhicule supprimé',v?.plaque||'');
    await loadVehicules();
    showToast('Véhicule supprimé','success');
  };

  window.logout = async function() {
    try {
      const user = auth.currentUser;
      if (user) {
        await deleteDoc(doc(db, 'online', user.uid));
      }
    } catch(e) { console.warn('Logout online removal failed:', e); }
    await signOut(auth);
    sessionStorage.clear();
    window.location.href = 'index.html';
  };
</script>

</body>
</html>
