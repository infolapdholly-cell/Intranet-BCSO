<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/bcsonouveau.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCSO Intranet — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#07090e; --panel:#0e1420; --panel2:#121a2c; --line:#1c2a42; --line2:#243350;
      --green-acc:#16a34a; --blue-b:#22c55e; --blue-l:#86efac; --blue-dim:rgba(37,99,235,.1);
      --green:#16a34a; --green-l:#4ade80; --green-dim:rgba(22,163,74,.1);
      --red:#b91c1c; --red-l:#f87171; --red-dim:rgba(185,28,28,.1);
      --text:#c8d8f0; --text2:#6b82a0; --text3:#3d5070;
      --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body { font-family:var(--sans); background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; position:relative; }

    /* FOND GRILLE */
    .bg-grid {
      position:fixed; inset:0; z-index:0;
      background-image: linear-gradient(rgba(37,99,235,.035) 1px,transparent 1px), linear-gradient(90deg,rgba(37,99,235,.035) 1px,transparent 1px);
      background-size:40px 40px;
    }
    /* VIGNETTE */
    .bg-vignette {
      position:fixed; inset:0; z-index:1;
      background:radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(7,9,14,.8) 100%);
      pointer-events:none;
    }
    /* SCANLINES */
    .bg-scan {
      position:fixed; inset:0; z-index:2;
      background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.08) 3px, rgba(0,0,0,.08) 4px);
      pointer-events:none; opacity:.4;
    }

    /* CONTAINER */
    .wrap { position:relative; z-index:10; width:100%; max-width:380px; padding:20px; animation:riseUp .5s ease both; }
    @keyframes riseUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

    /* LOGO DE FOND */
    .bg-logo {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:95vw; height:95vw;
      max-width:950px; max-height:950px;
      object-fit:contain;
      opacity:.07;
      filter:blur(2px) grayscale(20%);
      z-index:1;
      pointer-events:none;
      animation:bgLogoPulse 7s ease-in-out infinite;
    }
    @keyframes bgLogoPulse { 0%,100%{opacity:.055;transform:translate(-50%,-50%) scale(1)} 50%{opacity:.09;transform:translate(-50%,-50%) scale(1.02)} }

    /* LOGO */
    .logo-area { text-align:center; margin-bottom:22px; }
    .logo-img {
      width:100px; height:100px;
      object-fit:contain;
      display:block;
      margin:0 auto 16px;
      filter:drop-shadow(0 0 20px rgba(34,197,94,.45));
      animation:logoGlow 4s ease-in-out infinite;
    }
    @keyframes logoGlow { 0%,100%{filter:drop-shadow(0 0 14px rgba(34,197,94,.35))} 50%{filter:drop-shadow(0 0 28px rgba(34,197,94,.65))} }
    .logo-title { font-family:var(--mono); font-size:16px; font-weight:600; letter-spacing:6px; color:var(--text); text-transform:uppercase; margin-bottom:5px; }
    .logo-sub { font-family:var(--mono); font-size:8px; color:var(--accent-b); letter-spacing:4px; text-transform:uppercase; opacity:.8; }

    /* DIVIDER */
    .divider { display:flex; align-items:center; gap:10px; margin:0 0 20px; }
    .divider-line { flex:1; height:1px; background:var(--line2); opacity:.5; }
    .divider span { font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:3px; white-space:nowrap; }

    /* CARD */
    .card { background:rgba(14,20,32,.95); border:1px solid var(--line2); border-radius:6px; padding:26px 24px; position:relative; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.7); }
    .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--blue-b),transparent); }

    /* STATUS BAR */
    .sys-status {
      display:flex; align-items:center; gap:7px; margin-bottom:20px;
      padding:7px 11px; background:var(--green-dim);
      border:1px solid rgba(22,163,74,.25); border-radius:3px;
    }
    .sys-dot { width:5px; height:5px; border-radius:50%; background:var(--green-l); animation:dotPulse 2s ease infinite; flex-shrink:0; }
    @keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:.2} }
    .sys-text { font-family:var(--mono); font-size:8px; font-weight:600; color:var(--green-l); letter-spacing:2px; text-transform:uppercase; }

    /* CHAMPS */
    .field { margin-bottom:14px; }
    .field label { font-family:var(--mono); font-size:8px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text3); display:block; margin-bottom:6px; }
    .field input {
      width:100%; padding:9px 11px;
      background:var(--panel2); border:1px solid var(--line2); border-radius:3px;
      color:var(--text); font-family:var(--mono); font-size:13px; outline:none;
      transition:border-color .15s, box-shadow .15s;
    }
    .field input:focus { border-color:var(--accent-b); box-shadow:0 0 0 2px rgba(34,197,94,.15); }
    .field input::placeholder { color:var(--text3); opacity:.6; }
    .field input.err { border-color:var(--red); }

    /* ERREUR */
    .err-box {
      display:none; background:rgba(185,28,28,.08); border:1px solid rgba(185,28,28,.3);
      border-radius:3px; padding:8px 12px; margin-bottom:14px;
      font-family:var(--mono); font-size:10px; color:var(--red-l);
      animation:shake .35s ease;
    }
    .err-box.show { display:flex; align-items:center; gap:8px; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 60%{transform:translateX(5px)} }

    /* BOUTON */
    .btn-login {
      width:100%; padding:10px; background:var(--accent); border:none; border-radius:3px;
      color:#fff; font-family:var(--mono); font-size:10px; font-weight:600;
      letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all .15s;
      margin-top:4px;
    }
    .btn-login:hover { background:var(--blue-b); }
    .btn-login:disabled { opacity:.4; cursor:not-allowed; }

    /* FOOTER */
    .footer { text-align:center; margin-top:18px; font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:2px; }

    /* OVERLAY ACCÈS REFUSÉ */
    #denyOverlay {
      display:none; position:fixed; inset:0; z-index:9999;
      background:rgba(100,5,5,.94); backdrop-filter:blur(6px);
      align-items:center; justify-content:center; flex-direction:column;
    }
    #denyOverlay.show { display:flex; animation:fadeIn .15s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .deny-icon { font-size:72px; margin-bottom:18px; opacity:.9; }
    .deny-title { font-family:var(--mono); font-size:28px; font-weight:600; letter-spacing:8px; color:#fff; text-transform:uppercase; margin-bottom:8px; }
    .deny-sub   { font-family:var(--mono); font-size:11px; color:rgba(255,255,255,.6); letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; }
    .deny-count { font-family:var(--mono); font-size:10px; color:rgba(255,255,255,.35); letter-spacing:2px; margin-top:16px; }

    @media (max-width:440px) { .wrap { padding:14px; } .card { padding:20px 18px; } .logo-title { font-size:14px; } }
  </style>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BCSO">
  <meta name="theme-color" content="#16a34a">
  <link rel="apple-touch-icon" href="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/bcsonouveau.png">
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-vignette"></div>
<div class="bg-scan"></div>
<img class="bg-logo" src="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/bcsonouveau.png" alt="" onerror="this.style.display='none'">

<!-- OVERLAY REFUS -->
<div id="denyOverlay">
  <div class="deny-icon">⛔</div>
  <div class="deny-title">Accès refusé</div>
  <div class="deny-sub">Identifiants incorrects</div>
  <div class="deny-sub">Connexion non autorisée</div>
  <div class="deny-count" id="denyCount"></div>
</div>

<div class="wrap">
  <div class="logo-area">
    <img class="logo-img" src="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/bcsonouveau.png" alt="BCSO" onerror="this.style.display='none'">
    <div class="logo-title">B · C · S · O</div>
    <div class="logo-sub">Intranet — Accès sécurisé</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span>Authentification requise</span>
    <div class="divider-line"></div>
  </div>

  <div class="card">
    <div class="sys-status">
      <div class="sys-dot"></div>
      <div class="sys-text">Système en ligne — Blaine County Sheriff's Office</div>
    </div>

    <div class="field">
      <label>Identifiant</label>
      <input type="email" id="liEmail" placeholder="officier@bcso.gov" autocomplete="username">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="liPass" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="err-box" id="liErr">
      <span>✕</span><span id="liErrText">Identifiants incorrects.</span>
    </div>

    <button class="btn-login" id="liBtn" onclick="doLogin()">Connexion</button>
  </div>

  <div class="footer">BCSO Intranet v8.0 — Hébergé par Holly V — Accès réservé au personnel</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── Vérifier maintenance DÈS l'arrivée sur la page login ──
  (async () => {
    try {
      const _app = initializeApp({
        apiKey:"VOTRE_BCSO_API_KEY",
        authDomain:"bcso-intranet-2aed9.firebaseapp.com",
        projectId:"bcso-intranet-2aed9",
        storageBucket:"bcso-intranet-2aed9.firebasestorage.app",
        messagingSenderId:"VOTRE_SENDER_ID",
        appId:"1:VOTRE_SENDER_ID:web:a32d5e89bcff75bd8b3547"
      });
      const _db = getFirestore(_app);
      const mSnap = await getDoc(doc(_db,'config','maintenance'));
      if (mSnap.exists() && mSnap.data().enabled === true) {
        const d = mSnap.data();
        const params = new URLSearchParams({ msg: d.message||'', eta: d.eta||'', reason: d.reason||'' });
        // Afficher overlay de maintenance sur la page login elle-même
        document.body.style.opacity = '0';
        window.location.replace('maintenance.html?' + params.toString());
      }
    } catch(e) { /* fail-open */ }
  })();
  // ──────────────────────────────────────────────────────────

  const firebaseConfig = {
    apiKey:"VOTRE_BCSO_API_KEY",
    authDomain:"bcso-intranet-2aed9.firebaseapp.com",
    projectId:"bcso-intranet-2aed9",
    storageBucket:"bcso-intranet-2aed9.firebasestorage.app",
    messagingSenderId:"VOTRE_SENDER_ID",
    appId:"1:VOTRE_SENDER_ID:web:a32d5e89bcff75bd8b3547"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    if (!user) return; // Pas connecté, on reste sur la page login
    try {
      // Vérifier compte suspendu
      const uSnap = await getDoc(doc(db,'users',user.uid));
      if (uSnap.exists() && uSnap.data().suspended) {
        // Compte suspendu : déconnecter silencieusement et afficher erreur
        const { signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
        await signOut(auth);
        const errText = document.getElementById('liErrText');
        const errBox  = document.getElementById('liErr');
        if (errText) errText.textContent = 'Identifiants incorrects. Accès refusé.';
        if (errBox)  errBox.classList.add('show');
        return;
      }

      // Vérifier maintenance — seulement Shérif passe
      const mSnap = await getDoc(doc(db,'config','maintenance'));
      if (mSnap.exists() && mSnap.data().enabled === true) {
        const userGrade = uSnap.exists() ? (uSnap.data().grade||'cadet').toLowerCase() : 'cadet';
        if (userGrade !== 'shérif') {
          const d = mSnap.data();
          const params = new URLSearchParams({ msg: d.message||'', eta: d.eta||'', reason: d.reason||'' });
          window.location.replace('maintenance.html?' + params.toString());
          return;
        }
      }

      // Vérifier si première connexion (forcePasswordChange)
      const forceChange = uSnap.exists() && uSnap.data().forcePasswordChange;

      // Tout bon → rafraîchir grade et rediriger
      await refreshGrade(user);
      window.location.href = forceChange ? 'change-password.html' : 'dashboard.html';
    } catch(e) {
      // En cas d'erreur réseau, laisser passer (fail-open)
      await refreshGrade(user);
      window.location.href = 'dashboard.html';
    }
  });

  async function refreshGrade(user) {
    try {
      const snap = await getDoc(doc(db,'users',user.uid));
      if (snap.exists()) {
        const d = snap.data();
        const grade = (d.grade||'cadet').toLowerCase();
        const name  = d.displayName || user.email;
        localStorage.setItem('bcso_grade', grade);
        localStorage.setItem('bcso_name',  name);
        localStorage.setItem('bcso_uid',   user.uid);
        await setDoc(doc(db,'online',user.uid), {
          uid:user.uid, displayName:name, grade,
          connectedAt:new Date().toISOString(), lastSeen:new Date().toISOString()
        });
      }
    } catch(e) { console.warn('refreshGrade:', e); }
  }

  window.doLogin = async function() {
    const email   = document.getElementById('liEmail').value.trim();
    const pass    = document.getElementById('liPass').value;
    const btn     = document.getElementById('liBtn');
    const errBox  = document.getElementById('liErr');
    const errText = document.getElementById('liErrText');

    errBox.classList.remove('show');
    document.getElementById('liEmail').classList.remove('err');
    document.getElementById('liPass').classList.remove('err');

    if (!email) { document.getElementById('liEmail').classList.add('err'); return; }
    if (!pass)  { document.getElementById('liPass').classList.add('err');  return; }

    btn.disabled = true;
    btn.textContent = 'Vérification...';

    try {
      const cred = await signInWithEmailAndPassword(auth, email, pass);
      await refreshGrade(cred.user);

      // onAuthStateChanged s'occupe des vérifications maintenance + suspension
      // Ici on affiche juste le feedback visuel
      btn.textContent = 'Authentifié ✓';
      btn.style.background = 'var(--green)';

    } catch(e) {
      let msg = 'Identifiants incorrects. Accès refusé.';
      if (e.code === 'auth/too-many-requests') msg = 'Trop de tentatives. Réessayez plus tard.';
      if (e.code === 'auth/invalid-email')     msg = 'Adresse email invalide.';

      errText.textContent = msg;
      errBox.classList.add('show');
      document.getElementById('liPass').classList.add('err');

      const overlay  = document.getElementById('denyOverlay');
      const countEl  = document.getElementById('denyCount');
      overlay.classList.add('show');

      let secs = 5;
      countEl.textContent = `Réessayez dans ${secs} secondes...`;
      const t = setInterval(() => {
        secs--;
        if (secs > 0) {
          countEl.textContent = `Réessayez dans ${secs} seconde${secs>1?'s':''}...`;
        } else {
          clearInterval(t);
          overlay.classList.remove('show');
          document.getElementById('liPass').classList.remove('err');
          document.getElementById('liPass').value = '';
          document.getElementById('liPass').focus();
          btn.disabled = false;
          btn.textContent = 'Connexion';
          btn.style.background = '';
        }
      }, 1000);
    }
  };

  document.addEventListener('keydown', e => { if (e.key==='Enter') window.doLogin(); });
</script>
</body>
</html>
