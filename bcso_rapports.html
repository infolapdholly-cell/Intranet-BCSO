<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCSO — Rapports d'intervention</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BCSO">
  <meta name="theme-color" content="#1458a0">
  <link rel="apple-touch-icon" href="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png">
</head>
<body>
<div class="app-shell">
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <div class="topbar">
    <div class="tb-left">
      <button class="tb-menu-btn" onclick="toggleSidebar()">☰</button>
      <img class="tb-logo" src="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png" alt="BCSO" onerror="this.style.display='none'">
      <div class="tb-sep" style="width:1px;height:26px;background:var(--border)"></div>
      <div class="tb-title">B.C.S.O</div>
      <div class="tb-sep" style="width:1px;height:26px;background:var(--border)"></div>
      <div class="tb-page">RAPPORTS</div>
    </div>
    <div class="tb-right">
      <div class="tb-time" id="tbClock">--:--:--</div>
      <span class="tb-grade" id="tbGrade">—</span>
      <span class="tb-name" id="tbName">Officier</span>
      <button class="btn-out" onclick="logout()">Déconnexion</button>
    </div>
  </div>
  <div class="shell">
    <div class="sidebar" id="sidebar"></div>
    <div class="main">
      <div class="page-head">
        <div class="page-head-left">
          <h2>RAPPORTS D'INTERVENTION</h2>
          <p>// JOURNAUX OPÉRATIONNELS — BLAINE COUNTY SHERIFF OFFICE</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="window.print()">📋 Imprimer liste liste</button>
          <button class="btn btn-primary" id="btnNew">+ Nouveau rapport</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-box blue"><div class="stat-lbl">TOTAL</div><div class="stat-val" id="sTotal">—</div></div>
        <div class="stat-box gold"><div class="stat-lbl">OUVERTS</div><div class="stat-val" id="sOuverts">—</div></div>
        <div class="stat-box green"><div class="stat-lbl">FERMÉS</div><div class="stat-val" id="sFermes">—</div></div>
        <div class="stat-box red"><div class="stat-lbl">CE MOIS</div><div class="stat-val" id="sMois">—</div></div>
      </div>

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Rechercher par titre, officier, type..." oninput="filterRapports()">
        <select id="filterType" onchange="filterRapports()">
          <option value="">Tous les types</option>
          <option>Arrestation</option><option>Patrouille</option>
          <option>Intervention armée</option><option>Accident</option>
          <option>Poursuite</option><option>Homicide</option>
          <option>Trafic de drogue</option><option>Autre</option>
        </select>
        <select id="filterStatut" onchange="filterRapports()">
          <option value="">Tous les statuts</option>
          <option value="Ouvert">Ouvert</option>
          <option value="Fermé">Fermé</option>
        </select>
      </div>

      <div class="card">
        <div class="card-body" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead><tr><th>RÉFÉRENCE</th><th>TITRE</th><th>TYPE</th><th>OFFICIER</th><th>DATE</th><th>SUSPECTS</th><th>STATUT</th><th>ACTIONS</th></tr></thead>
              <tbody id="rapportsTable"><tr><td colspan="8" style="text-align:center;padding:30px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px">CHARGEMENT...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL FORMULAIRE -->
<div class="modal-bg" id="modalForm">
  <div class="modal" style="max-width:680px">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">NOUVEAU RAPPORT</div>
      <button class="modal-close" onclick="closeModal('modalForm')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid g2" style="margin-bottom:12px">
        <div class="fg"><label>Titre</label><input id="rTitre" placeholder="Ex: Intervention rue Grove"></div>
        <div class="fg"><label>Type d'incident</label>
          <select id="rType">
            <option>Arrestation</option><option>Patrouille</option>
            <option>Intervention armée</option><option>Accident</option>
            <option>Poursuite</option><option>Homicide</option>
            <option>Trafic de drogue</option><option>Autre</option>
          </select>
        </div>
        <div class="fg"><label>Officier responsable</label><input id="rOfficier"></div>
        <div class="fg"><label>Équipe / Officiers impliqués</label><input id="rEquipe" placeholder="Noms séparés par virgules"></div>
        <div class="fg"><label>Date</label><input type="date" id="rDate"></div>
        <div class="fg"><label>Heure</label><input type="time" id="rHeure"></div>
        <div class="fg"><label>Lieu</label><input id="rLieu" placeholder="Ex: Grove Street, LS"></div>
        <div class="fg"><label>Statut</label>
          <select id="rStatut"><option>Ouvert</option><option>Fermé</option></select>
        </div>
      </div>
      <div class="fg" style="margin-bottom:12px">
        <label>Suspects impliqués</label>
        <input id="rSuspects" placeholder="Noms séparés par virgules">
      </div>
      <div class="fg" style="margin-bottom:12px">
        <label>Résumé</label>
        <textarea id="rResume" style="min-height:70px" placeholder="Résumé bref de l'intervention..."></textarea>
      </div>
      <div class="fg" style="margin-bottom:12px">
        <label>Description complète</label>
        <textarea id="rDesc" style="min-height:130px" placeholder="Déroulement détaillé..."></textarea>
      </div>
      <div class="fg">
        <label>Conclusion / Suite à donner</label>
        <textarea id="rConclusion" style="min-height:70px" placeholder="Actions à suivre..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalForm')">Annuler</button>
      <button class="btn btn-primary" onclick="saveRapport()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL DETAIL -->
<div class="modal-bg" id="modalDetail">
  <div class="modal" style="max-width:700px">
    <div class="modal-head">
      <div class="modal-title" id="detailTitle">RAPPORT</div>
      <button class="modal-close" onclick="closeModal('modalDetail')">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { initPage, startClock, showToast, openModal, closeModal, setupModalClose, statusBadge, addLog, generateRef, getPerms, captureModal } from './utils.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC_kfIx8Q5d6zha5NUFNpsbR5D02d5q1DA",
    authDomain: "bcso-intranet-3d5ab.firebaseapp.com",
    projectId: "bcso-intranet-3d5ab",
    storageBucket: "bcso-intranet-3d5ab.firebasestorage.app",
    messagingSenderId: "788391241057",
    appId: "1:788391241057:web:66e876f97ee32825f01120"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let allRapports = [];
  let editingId = null;
  let userGrade = 'recruit';

  startClock('tbClock');
  setupModalClose();
  window.closeModal = closeModal;
  window.captureModal = captureModal;

  initPage(auth, db, onAuthStateChanged, 'rapports').then(async ({ grade, name, perms }) => {
    userGrade = grade;
    if (!perms.canWrite) document.getElementById('btnNew').style.display = 'none';
    else document.getElementById('btnNew').addEventListener('click', () => newRapport());
    document.getElementById('rOfficier').value = name;
    document.getElementById('rDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('rHeure').value = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    await loadRapports();
  });

  async function loadRapports() {
    try {
      const snap = await getDocs(query(collection(db,'rapports'), orderBy('createdAt','desc')));
      allRapports = snap.docs.map(d => ({id:d.id,...d.data()}));
      const now = new Date();
      const moisDebut = new Date(now.getFullYear(),now.getMonth(),1).toISOString();
      document.getElementById('sTotal').textContent = allRapports.length;
      document.getElementById('sOuverts').textContent = allRapports.filter(r=>r.statut==='Ouvert').length;
      document.getElementById('sFermes').textContent = allRapports.filter(r=>r.statut==='Fermé').length;
      document.getElementById('sMois').textContent = allRapports.filter(r=>r.createdAt>=moisDebut).length;
      renderRapports(allRapports);
    } catch(e) { console.error(e); }
  }

  function renderRapports(list) {
    const tb = document.getElementById('rapportsTable');
    if (!list.length) { tb.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="ei">📋</div><p>AUCUN RAPPORT</p></div></td></tr>'; return; }
    const perms = getPerms(userGrade);
    tb.innerHTML = list.map(r => `
      <tr>
        <td style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)">${r.reference||'—'}</td>
        <td><strong>${r.titre||'—'}</strong></td>
        <td style="font-size:12px">${r.type||'—'}</td>
        <td style="font-size:12px">${r.officier||'—'}</td>
        <td style="font-family:'Share Tech Mono',monospace;font-size:11px">${r.date||'—'} ${r.heure||''}</td>
        <td style="font-size:12px;color:var(--muted)">${r.suspects||'—'}</td>
        <td>${r.statut==='Ouvert'?'<span class="badge b-open">Ouvert</span>':'<span class="badge b-closed">Fermé</span>'}</td>
        <td style="display:flex;gap:4px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="viewRapport('${r.id}')">👁️</button>
          <button class="btn btn-ghost btn-sm" onclick="printRapport('${r.id}')">🖨️</button>
          ${perms.canWrite?`<button class="btn btn-ghost btn-sm" onclick="editRapport('${r.id}')">✏️</button>`:''}
          ${perms.canDelete?`<button class="btn btn-danger btn-sm" onclick="deleteRapport('${r.id}')">🗑️</button>`:''}
        </td>
      </tr>`).join('');
  }

  window.filterRapports = function() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const t = document.getElementById('filterType').value;
    const s = document.getElementById('filterStatut').value;
    renderRapports(allRapports.filter(r =>
      (r.titre+' '+r.officier+' '+r.type+' '+(r.suspects||'')).toLowerCase().includes(q) &&
      (!t||r.type===t) && (!s||r.statut===s)
    ));
  };

  function newRapport() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'NOUVEAU RAPPORT';
    ['rTitre','rEquipe','rLieu','rSuspects','rResume','rDesc','rConclusion'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('rStatut').value = 'Ouvert';
    document.getElementById('rType').value = 'Arrestation';
    openModal('modalForm');
  }

  window.editRapport = function(id) {
    const r = allRapports.find(x=>x.id===id);
    if (!r) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'MODIFIER RAPPORT';
    document.getElementById('rTitre').value = r.titre||'';
    document.getElementById('rType').value = r.type||'Arrestation';
    document.getElementById('rOfficier').value = r.officier||'';
    document.getElementById('rEquipe').value = r.equipe||'';
    document.getElementById('rDate').value = r.date||'';
    document.getElementById('rHeure').value = r.heure||'';
    document.getElementById('rLieu').value = r.lieu||'';
    document.getElementById('rStatut').value = r.statut||'Ouvert';
    document.getElementById('rSuspects').value = r.suspects||'';
    document.getElementById('rResume').value = r.resume||'';
    document.getElementById('rDesc').value = r.description||'';
    document.getElementById('rConclusion').value = r.conclusion||'';
    openModal('modalForm');
  };

  window.saveRapport = async function() {
    const titre = document.getElementById('rTitre').value.trim();
    if (!titre) { showToast('Le titre est obligatoire','error'); return; }
    const payload = {
      reference: editingId ? (allRapports.find(r=>r.id===editingId)?.reference||generateRef('RPT')) : generateRef('RPT'),
      titre, type: document.getElementById('rType').value,
      officier: document.getElementById('rOfficier').value,
      equipe: document.getElementById('rEquipe').value,
      date: document.getElementById('rDate').value,
      heure: document.getElementById('rHeure').value,
      lieu: document.getElementById('rLieu').value,
      statut: document.getElementById('rStatut').value,
      suspects: document.getElementById('rSuspects').value,
      resume: document.getElementById('rResume').value,
      description: document.getElementById('rDesc').value,
      conclusion: document.getElementById('rConclusion').value,
      updatedAt: new Date().toISOString()
    };
    try {
      if (editingId) {
        await updateDoc(doc(db,'rapports',editingId), payload);
        await addLog(db,'Rapport modifié',titre);
        showToast('Rapport mis à jour','success');
      } else {
        payload.createdAt = new Date().toISOString();
        await addDoc(collection(db,'rapports'), payload);
        await addLog(db,'Rapport créé',`${titre} — ${payload.type}`);
        showToast('Rapport créé','success');
      }
      closeModal('modalForm'); editingId = null;
      await loadRapports();
    } catch(e) { showToast('Erreur: '+e.message,'error'); }
  };

  window.deleteRapport = async function(id) {
    if (!confirm('Supprimer ce rapport ?')) return;
    const r = allRapports.find(x=>x.id===id);
    await deleteDoc(doc(db,'rapports',id));
    await addLog(db,'Rapport supprimé',r?.titre||'');
    await loadRapports();
    showToast('Rapport supprimé','success');
  };

  window.viewRapport = function(id) {
    const r = allRapports.find(x=>x.id===id);
    if (!r) return;
    document.getElementById('detailTitle').textContent = r.titre||'RAPPORT';
    document.getElementById('detailBody').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px">
        <div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:3px">RÉFÉRENCE</div><div style="font-family:'Share Tech Mono',monospace;font-size:13px">${r.reference||'—'}</div></div>
        <div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:3px">STATUT</div>${r.statut==='Ouvert'?'<span class="badge b-open">Ouvert</span>':'<span class="badge b-closed">Fermé</span>'}</div>
        <div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:3px">TYPE</div><div style="font-size:13px">${r.type||'—'}</div></div>
        <div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:3px">DATE / HEURE</div><div style="font-family:'Share Tech Mono',monospace;font-size:13px">${r.date||'—'} ${r.heure||''}</div></div>
        <div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:3px">OFFICIER</div><div style="font-size:13px">${r.officier||'—'}</div></div>
        <div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:3px">ÉQUIPE</div><div style="font-size:13px">${r.equipe||'—'}</div></div>
        <div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:3px">LIEU</div><div style="font-size:13px">${r.lieu||'—'}</div></div>
        <div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:3px">SUSPECTS</div><div style="font-size:13px;color:var(--danger-l)">${r.suspects||'—'}</div></div>
      </div>
      ${r.resume?`<div style="margin-bottom:14px"><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:6px">RÉSUMÉ</div><div style="font-size:13px;line-height:1.6;padding:12px;background:var(--surface2);border-radius:5px">${r.resume}</div></div>`:''}
      ${r.description?`<div style="margin-bottom:14px"><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:6px">DESCRIPTION COMPLÈTE</div><div style="font-size:13px;line-height:1.7;padding:12px;background:var(--surface2);border-radius:5px;white-space:pre-wrap">${r.description}</div></div>`:''}
      ${r.conclusion?`<div><div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:6px">CONCLUSION</div><div style="font-size:13px;line-height:1.6;padding:12px;background:var(--surface2);border-radius:5px">${r.conclusion}</div></div>`:''}
    `;
    const perms = getPerms(userGrade);
    document.getElementById('detailFooter').innerHTML = `
      <button class="btn btn-ghost" onclick="closeModal('modalDetail')">Fermer</button>
      <button class="btn btn-ghost" onclick="printRapport('${r.id}')">🖨️ Imprimer</button>
      ${perms.canWrite?`<button class="btn btn-primary" onclick="closeModal('modalDetail');editRapport('${r.id}')">✏️ Modifier</button>`:''}
    `;
    openModal('modalDetail');
  };

  window.printRapport = function(id) {
    const r = allRapports.find(x=>x.id===id);
    if (!r) return;
    const w = window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>Rapport — ${r.reference}</title>
    <style>body{font-family:Arial,sans-serif;padding:40px;max-width:750px;margin:0 auto;color:#000}.header{display:flex;justify-content:space-between;border-bottom:3px solid #003087;padding-bottom:14px;margin-bottom:24px}h1{font-size:20px;color:#003087;margin:0}.sub{font-size:11px;color:#666;margin-top:3px}.ref{font-family:monospace;font-size:13px;background:#e8f0fe;padding:5px 10px;border-radius:4px;color:#003087;font-weight:bold}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}.lbl{font-size:10px;font-weight:bold;text-transform:uppercase;color:#666;letter-spacing:1px}.val{font-size:13px;margin-top:2px}h2{font-size:12px;text-transform:uppercase;color:#003087;border-bottom:1px solid #003087;padding-bottom:3px;margin:16px 0 8px;letter-spacing:2px}.block{font-size:13px;line-height:1.7;padding:10px;background:#f8f8f8;border-left:3px solid #003087;white-space:pre-wrap}.sig-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:30px;margin-top:40px}.sig{border-top:1px solid #000;padding-top:6px;font-size:11px;text-align:center}.space{height:50px}.footer{margin-top:24px;font-size:10px;color:#666;text-align:center;border-top:1px solid #ccc;padding-top:10px}</style>
    </head><body>
    <div class="header"><div><h1>🔵 BCSO — Rapport d'Intervention</h1><div class="sub">Blaine County Sheriff Office — Document officiel confidentiel</div></div><div style="text-align:right"><div class="ref">${r.reference||'—'}</div><div style="font-size:11px;color:#666;margin-top:4px">${new Date().toLocaleDateString('fr-FR')}</div></div></div>
    <div class="grid">
      <div><div class="lbl">Titre</div><div class="val"><strong>${r.titre||'—'}</strong></div></div>
      <div><div class="lbl">Type</div><div class="val">${r.type||'—'}</div></div>
      <div><div class="lbl">Date & Heure</div><div class="val">${r.date||'—'} ${r.heure||''}</div></div>
      <div><div class="lbl">Lieu</div><div class="val">${r.lieu||'—'}</div></div>
      <div><div class="lbl">Officier responsable</div><div class="val">${r.officier||'—'}</div></div>
      <div><div class="lbl">Équipe</div><div class="val">${r.equipe||'—'}</div></div>
      <div><div class="lbl">Suspects</div><div class="val" style="color:#c0392b">${r.suspects||'—'}</div></div>
      <div><div class="lbl">Statut</div><div class="val">${r.statut||'—'}</div></div>
    </div>
    ${r.resume?`<h2>Résumé</h2><div class="block">${r.resume}</div>`:''}
    ${r.description?`<h2>Description Complète</h2><div class="block">${r.description}</div>`:''}
    ${r.conclusion?`<h2>Conclusion</h2><div class="block">${r.conclusion}</div>`:''}
    <div class="sig-grid">
      <div class="sig"><div class="space"></div>Officier rédacteur</div>
      <div class="sig"><div class="space"></div>Superviseur</div>
      <div class="sig"><div class="space"></div>Chef de département</div>
    </div>
    <div class="footer">Réf: ${r.reference||'—'} — Généré le ${new Date().toLocaleString('fr-FR')} — BCSO Intranet — CONFIDENTIEL</div>
</body></html>`);
    w.document.close(); setTimeout(()=>w.print(),500);
  };

  window.logout = async function() {
    try {
      const user = auth.currentUser;
      if (user) {
        await deleteDoc(doc(db, 'online', user.uid));
      }
    } catch(e) { console.warn('Logout online removal failed:', e); }
    await signOut(auth);
    sessionStorage.clear();
    window.location.href = 'index.html';
  };
