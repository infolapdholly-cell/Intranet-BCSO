<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
:root {
  --bg: #05080f;
  --bg2: #05080f;
  --surface: #0c1220;
  --surface2: #101a2e;
  --surface3: #152038;
  --panel: #0c1220;
  --panel2: #101a2e;
  --panel3: #152038;
  --border: #1b3a5e;
  --line: #1b3a5e;
  --line2: #1b3a5e;
  --border2: #1b3a5e;
  --accent: #155e2a;
  --accent-b: #22a050;
  --accent-l: #22a050;
  --accent-glow: rgba(26,160,80,.22);
  --accent-dim: rgba(26,160,80,.12);
  --green-acc: #155e2a;
  --blue-b: #22a050;
  --blue-l: #22a050;
  --blue-dim: rgba(26,160,80,.12);
  --gold: #1a7a3a;
  --gold-l: #1a7a3a;
  --gold-dim: rgba(201,170,77,.15);
  --text: #dce8f4;
  --text2: #445e7a;
  --text3: #2d4260;
  --muted: #445e7a;
  --danger: #c0392b;
  --danger-l: #e74c3c;
  --red: #c0392b;
  --red-l: #e74c3c;
  --red-dim: rgba(192,57,43,.12);
  --success: #1e9e56;
  --green: #1e9e56;
  --green-l: #1e9e56;
  --green-dim: rgba(30,158,86,.12);
  --warning: #d68910;
  --amber: #d68910;
  --amber-l: #d68910;
  --amber-dim: rgba(214,137,16,.12);
  --purple: #7d3c98;
  --purple-l: #bf7df0;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Rajdhani', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
</style>
  <link rel="icon" type="image/png" href="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCSO — Armurerie</title>
  <link rel="stylesheet" href="style.css?v=14">
  <style>
    .arme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
    .arme-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;transition:all .2s;animation:fadeIn .3s ease both;}
    .arme-card::before{content:'';display:block;height:3px;}
    .arme-card.stock::before{background:var(--green);}
    .arme-card.assignee::before{background:var(--blue-b);}
    .arme-card.maint::before{background:var(--amber-l);}
    .arme-card.perdue::before{background:var(--red);}
    .arme-card:hover{border-color:var(--accent);box-shadow:0 0 16px rgba(34,197,94,.15);transform:translateY(-2px);}
    .arme-icon{font-size:44px;text-align:center;padding:18px 0 8px;}
    .arme-serie{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);text-align:center;letter-spacing:2px;margin-bottom:4px;}
    .arme-modele{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;text-align:center;margin-bottom:12px;}
    .arme-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;padding-bottom:6px;border-bottom:1px solid rgba(27,58,94,.3);}
    .arme-row:last-child{border-bottom:none;}
    .arme-lbl{color:var(--text2);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;}
    .arme-body{padding:0 16px 14px;}
    .arme-actions{display:flex;gap:6px;padding:10px 16px;border-top:1px solid var(--line);}
    .arme-actions button{flex:1;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  </style>
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BCSO">
  <meta name="theme-color" content="#16a34a">
  <link rel="apple-touch-icon" href="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png">
</head>
<body>
<div class="app-shell">
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="topbar">
  <div class="tb-left">
    <button class="tb-menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="tb-brand">
      <div class="tb-shield"></div>
      <img class="tb-logo" src="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png" alt="BCSO" onerror="this.style.display='none'">
      <div class="tb-title">B.C.S.O</div>
    </div>
    <div class="tb-page">Armurerie</div>
  </div>
  <div class="tb-right">
    <div class="tb-status"><div class="live-dot"></div>En ligne</div>
    <div class="tb-time" id="tbClock">--:--:--</div>
    <div class="tb-user">
      <span class="tb-grade" id="tbGrade">—</span>
      <span class="tb-name" id="tbName">Officier</span>
    </div>
    <button class="btn-out" onclick="logout()">Quitter</button>
  </div>
</div>
<div class="shell">
    <div class="sidebar" id="sidebar"></div>
    <div class="main">
      <div class="page-head">
        <div class="page-head-left"><h2>ARMURERIE</h2><p>// INVENTAIRE DES ARMES DE SERVICE — BCSO</p></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="window.print()">📋 Imprimer liste inventaire</button>
          <button class="btn btn-primary" id="btnNew" style="display:none">+ Ajouter arme</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-box blue"><div class="stat-lbl">TOTAL</div><div class="stat-val" id="sTotal">—</div></div>
        <div class="stat-box green"><div class="stat-lbl">EN STOCK</div><div class="stat-val" id="sStock">—</div></div>
        <div class="stat-box gold"><div class="stat-lbl">ASSIGNÉES</div><div class="stat-val" id="sAssignee">—</div></div>
        <div class="stat-box red"><div class="stat-lbl">PERDUES/SAISIES</div><div class="stat-val" id="sPerdue">—</div></div>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn btn-primary btn-sm" id="tabGrid" onclick="setView('grid',this)">⊞ Cartes</button>
        <button class="btn btn-ghost btn-sm" id="tabList" onclick="setView('list',this)">☰ Liste</button>
      </div>

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Rechercher par N° série, modèle, assigné..." oninput="filterArmes()">
        <select id="filterType" onchange="filterArmes()">
          <option value="">Tous les types</option>
          <option>Pistolet</option><option>Fusil d'assaut</option>
          <option>Fusil à pompe</option><option>Sniper</option>
          <option>SMG</option><option>LBD</option><option>Taser</option><option>Autre</option>
        </select>
        <select id="filterStatut" onchange="filterArmes()">
          <option value="">Tous les statuts</option>
          <option>En stock</option><option>Assignée</option>
          <option>Maintenance</option><option>Perdue</option><option>Saisie</option>
        </select>
      </div>

      <div id="viewGrid"><div class="arme-grid" id="armesGrid"><div class="empty-state"><div class="ei">🔫</div><p>CHARGEMENT...</p></div></div></div>
      <div id="viewList" style="display:none">
        <div class="card"><div class="card-body" style="padding:0"><div class="table-wrap">
          <table>
            <thead><tr><th>TYPE</th><th>N° SÉRIE</th><th>MODÈLE</th><th>ASSIGNÉE À</th><th>STATUT</th><th>DATE</th><th>NOTES</th><th>ACTIONS</th></tr></thead>
            <tbody id="armesList"></tbody>
          </table>
        </div></div></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalArme">
  <div class="modal" style="max-width:600px">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">AJOUTER UNE ARME</div>
      <button class="modal-close" onclick="closeModal('modalArme')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid g2" style="margin-bottom:12px">
        <div class="fg"><label>N° de série</label><input id="aSerie" placeholder="ex: BCSO-G17-0042"></div>
        <div class="fg"><label>Type</label>
          <select id="aType">
            <option>Pistolet</option><option>Fusil d'assaut</option>
            <option>Fusil à pompe</option><option>Sniper</option>
            <option>SMG</option><option>LBD</option><option>Taser</option><option>Autre</option>
          </select>
        </div>
        <div class="fg"><label>Modèle</label><input id="aModele" placeholder="ex: Glock 17"></div>
        <div class="fg"><label>Statut</label>
          <select id="aStatut">
            <option>En stock</option><option>Assignée</option>
            <option>Maintenance</option><option>Perdue</option><option>Saisie</option>
          </select>
        </div>
        <div class="fg"><label>Assignée à</label><input id="aAssign" placeholder="Nom de l'officier ou 'Stock'"></div>
        <div class="fg"><label>Date d'entrée</label><input type="date" id="aDate"></div>
        <div class="fg"><label>Photo URL</label><input id="aPhoto" placeholder="https://...image de l'arme..."></div>
      </div>
      <div class="fg"><label>Notes</label><textarea id="aNotes" style="min-height:70px" placeholder="État, historique, remarques..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalArme')">Annuler</button>
      <button class="btn btn-primary" onclick="saveArme()">Enregistrer</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { initPage, startClock, showToast, openModal, closeModal, setupModalClose, statusBadge, addLog, getPerms } from './utils.js?v=3';

  const firebaseConfig = {
    apiKey: "AIzaSyDTrqTkudkB4gM6tZlTDcDPTGk2gvi713Y",
    authDomain: "bcso-intranet-2aed9.firebaseapp.com",
    projectId: "bcso-intranet-2aed9",
    storageBucket: "bcso-intranet-2aed9.firebasestorage.app",
    messagingSenderId: "251172788920",
    appId: "1:251172788920:web:a32d5e89bcff75bd8b3547"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let allArmes = [], editingId = null, userPerms = {};

  const TYPE_ICONS = {
    'Pistolet':'🔫','Fusil d\'assaut':'🪖','Fusil à pompe':'💥',
    'Sniper':'🎯','SMG':'⚡','LBD':'🛡️','Taser':'⚡','Autre':'🔧'
  };
  const STATUT_CLASS = {
    'En stock':'stock','Assignée':'assignee',
    'Maintenance':'maint','Perdue':'perdue','Saisie':'perdue'
  };

  startClock('tbClock');
  setupModalClose();
  window.closeModal = closeModal;

  initPage(auth, db, onAuthStateChanged, 'armurerie').then(async ({ grade, name, perms }) => {
    userPerms = perms;

    // Accès restreint — Capitaine et plus seulement
    if (!perms.canManageWeapons) {
      document.querySelector('.main').innerHTML = `
        <div class="empty-state" style="padding:100px 20px">
          <div class="ei">🔒</div>
          <p>ACCÈS RESTREINT — GRADE INSUFFISANT</p>
          <p style="margin-top:8px;font-size:11px">Réservé au grade Capitaine et supérieur</p>
          <a href="dashboard.html" style="display:inline-block;margin-top:20px;padding:10px 24px;background:var(--accent);color:#fff;border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:700;text-decoration:none">← RETOUR</a>
        </div>`;
      return;
    }

    if (perms.canWrite) {
      document.getElementById('btnNew').style.display = '';
      document.getElementById('btnNew').addEventListener('click', () => newArme());
    }
    document.getElementById('aDate').value = new Date().toISOString().split('T')[0];
    await loadArmes();
  });

  async function loadArmes() {
    try {
      const snap = await getDocs(query(collection(db,'armes'), orderBy('serie')));
      allArmes = snap.docs.map(d => ({id:d.id,...d.data()}));
      document.getElementById('sTotal').textContent = allArmes.length;
      document.getElementById('sStock').textContent = allArmes.filter(a=>a.statut==='En stock').length;
      document.getElementById('sAssignee').textContent = allArmes.filter(a=>a.statut==='Assignée').length;
      document.getElementById('sPerdue').textContent = allArmes.filter(a=>a.statut==='Perdue'||a.statut==='Saisie').length;
      renderAll(allArmes);
    } catch(e) { console.error(e); }
  }

  function renderAll(list) { renderGrid(list); renderList(list); }

  function renderGrid(list) {
    const grid = document.getElementById('armesGrid');
    if (!list.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="ei">🔫</div><p>AUCUNE ARME</p></div>'; return; }
    grid.innerHTML = list.map(a => `
      <div class="arme-card ${STATUT_CLASS[a.statut]||'perdue'}">
        <div style="display:flex;align-items:center;justify-content:center;padding:16px 0 8px;min-height:90px">
          ${a.photoUrl
            ? `<img src="${a.photoUrl}" style="max-width:140px;max-height:80px;object-fit:contain;border-radius:8px;border:1px solid var(--line);display:block;margin:0 auto" onerror="this.outerHTML='<span style=font-size:44px>${TYPE_ICONS[a.type]||chr(39)+'🔫'+chr(39)}</span>'">`
            : `<span style="font-size:44px">${TYPE_ICONS[a.type]||'🔫'}</span>`}
        </div>
        <div class="arme-body">
          <div class="arme-serie">N° ${a.serie||'—'}</div>
          <div class="arme-modele">${a.modele||'—'}</div>
          <div class="arme-row"><span class="arme-lbl">TYPE</span><span style="font-size:12px">${a.type||'—'}</span></div>
          <div class="arme-row"><span class="arme-lbl">STATUT</span>${statusBadge(a.statut)}</div>
          <div class="arme-row"><span class="arme-lbl">ASSIGNÉE</span><span style="font-size:12px">${a.assigne||'—'}</span></div>
          <div class="arme-row"><span class="arme-lbl">DATE</span><span style="font-family:'IBM Plex Mono',monospace;font-size:11px">${a.dateEntree||'—'}</span></div>
          ${a.notes?`<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);margin-top:6px">${a.notes}</div>`:''}
        </div>
        <div class="arme-actions">
          ${userPerms.canWrite ? `
            <button class="btn btn-ghost btn-sm" onclick="editArme('${a.id}')">✏️ Modifier</button>
            <button class="btn btn-danger btn-sm" onclick="deleteArme('${a.id}')">🗑️</button>
          ` : `<div style="flex:1;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2)">LECTURE SEULE</div>`}
        </div>
      </div>`).join('');
  }

  function renderList(list) {
    const tb = document.getElementById('armesList');
    if (!list.length) { tb.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="ei">🔫</div><p>AUCUNE ARME</p></div></td></tr>'; return; }
    tb.innerHTML = list.map(a => `
      <tr>
        <td style="font-size:18px">${TYPE_ICONS[a.type]||'🔫'}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2)">${a.serie||'—'}</td>
        <td style="font-size:13px;font-weight:600">${a.modele||'—'}</td>
        <td style="font-size:12px">${a.assigne||'—'}</td>
        <td>${statusBadge(a.statut)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${a.dateEntree||'—'}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2)">${a.notes||'—'}</td>
        <td style="display:flex;gap:4px">
          ${userPerms.canWrite ? `
            <button class="btn btn-ghost btn-sm" onclick="editArme('${a.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteArme('${a.id}')">🗑️</button>
          ` : '—'}
        </td>
      </tr>`).join('');
  }

  window.filterArmes = function() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const t = document.getElementById('filterType').value;
    const s = document.getElementById('filterStatut').value;
    renderAll(allArmes.filter(a =>
      ((a.serie||'')+' '+(a.modele||'')+' '+(a.assigne||'')).toLowerCase().includes(q) &&
      (!t||a.type===t) && (!s||a.statut===s)
    ));
  };

  window.setView = function(v, btn) {
    document.getElementById('viewGrid').style.display = v==='grid'?'block':'none';
    document.getElementById('viewList').style.display = v==='list'?'block':'none';
    document.getElementById('tabGrid').className = v==='grid'?'btn btn-primary btn-sm':'btn btn-ghost btn-sm';
    document.getElementById('tabList').className = v==='list'?'btn btn-primary btn-sm':'btn btn-ghost btn-sm';
  };

  function newArme() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'AJOUTER UNE ARME';
    ['aSerie','aModele','aAssign','aNotes','aPhoto'].forEach(id => document.getElementById(id).value='');
    document.getElementById('aType').value = 'Pistolet';
    document.getElementById('aStatut').value = 'En stock';
    document.getElementById('aDate').value = new Date().toISOString().split('T')[0];
    openModal('modalArme');
  }

  window.editArme = function(id) {
    const a = allArmes.find(x=>x.id===id);
    if (!a) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'MODIFIER ARME';
    document.getElementById('aSerie').value = a.serie||'';
    document.getElementById('aType').value = a.type||'Pistolet';
    document.getElementById('aModele').value = a.modele||'';
    document.getElementById('aStatut').value = a.statut||'En stock';
    document.getElementById('aAssign').value = a.assigne||'';
    document.getElementById('aDate').value = a.dateEntree||'';
    document.getElementById('aPhoto').value = a.photoUrl||'';
    document.getElementById('aNotes').value = a.notes||'';
    openModal('modalArme');
  };

  window.saveArme = async function() {
    const serie = document.getElementById('aSerie').value.trim();
    if (!serie) { showToast('Le N° de série est obligatoire','error'); return; }
    const payload = {
      serie, photoUrl: document.getElementById('aPhoto').value,
      type: document.getElementById('aType').value,
      modele: document.getElementById('aModele').value,
      statut: document.getElementById('aStatut').value,
      assigne: document.getElementById('aAssign').value,
      dateEntree: document.getElementById('aDate').value,
      notes: document.getElementById('aNotes').value,
      updatedAt: new Date().toISOString()
    };
    try {
      if (editingId) {
        await updateDoc(doc(db,'armes',editingId), payload);
        await addLog(db,'Arme modifiée',`${serie} — ${payload.modele}`);
        showToast('Arme mise à jour','success');
      } else {
        payload.createdAt = new Date().toISOString();
        await addDoc(collection(db,'armes'), payload);
        await addLog(db,'Arme ajoutée',`${serie} — ${payload.modele}`);
        showToast('Arme ajoutée','success');
      }
      closeModal('modalArme'); editingId = null;
      await loadArmes();
    } catch(e) { showToast('Erreur: '+e.message,'error'); }
  };

  window.deleteArme = async function(id) {
    if (!confirm('Supprimer cette arme de l\'inventaire ?')) return;
    const a = allArmes.find(x=>x.id===id);
    await deleteDoc(doc(db,'armes',id));
    await addLog(db,'Arme supprimée',`${a?.serie||''} — ${a?.modele||''}`);
    await loadArmes();
    showToast('Arme supprimée','success');
  };

  window.logout = async function() {
    try {
      const user = auth.currentUser;
      if (user) {
        await deleteDoc(doc(db, 'online', user.uid));
      }
    } catch(e) { console.warn('Logout online removal failed:', e); }
    await signOut(auth);
    sessionStorage.clear();
    window.location.href = 'index.html';
  };
</script>

</body>
</html>
