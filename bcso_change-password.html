<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCSO — Changer le mot de passe</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#05080f; --surface:#0c1220; --surface2:#101a2e; --border:#1b3a5e; --accent:#1458a0; --accent-b:#2589d0; --accent-glow:rgba(37,137,208,.22); --text:#dce8f4; --muted:#445e7a; --danger:#c0392b; --danger-l:#e74c3c; --success:#1e9e56; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body { font-family:'Rajdhani',sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; position:relative; }
    body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(20,88,160,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(20,88,160,.06) 1px,transparent 1px); background-size:44px 44px; animation:gridScroll 25s linear infinite; }
    @keyframes gridScroll{to{transform:translateY(44px);}}
    @keyframes riseUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

    .box { position:relative; z-index:2; width:100%; max-width:400px; padding:20px; animation:riseUp .7s ease both; }
    .logo { text-align:center; margin-bottom:24px; }
    .logo img { width:70px; filter:drop-shadow(0 0 12px rgba(37,137,208,.9)); display:block; margin:0 auto; }
    .logo h1 { font-family:'Orbitron',monospace; font-size:18px; letter-spacing:6px; margin-top:12px; }
    .logo p { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--accent-b); letter-spacing:4px; margin-top:4px; }

    .card { background:rgba(12,18,32,.9); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:14px; padding:28px; box-shadow:0 0 40px rgba(20,88,160,.2); position:relative; overflow:hidden; }
    .card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent-b),transparent); }

    .alert-box { background:rgba(201,170,77,.08); border:1px solid rgba(201,170,77,.3); border-radius:8px; padding:12px 14px; margin-bottom:20px; display:flex; gap:10px; align-items:flex-start; }
    .alert-text { font-size:13px; line-height:1.5; color:#c9aa4d; }
    .alert-text strong { display:block; font-family:'Orbitron',monospace; font-size:11px; letter-spacing:2px; margin-bottom:4px; }

    .fg { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
    .fg label { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
    .fg input { padding:10px 13px; background:var(--surface2); border:1px solid var(--border); border-radius:5px; color:var(--text); font-family:'Share Tech Mono',monospace; font-size:14px; outline:none; transition:border-color .2s,box-shadow .2s; }
    .fg input:focus { border-color:var(--accent-b); box-shadow:0 0 0 3px var(--accent-glow); }

    .err-msg { background:rgba(192,57,43,.1); border:1px solid var(--danger); border-radius:4px; padding:9px 12px; font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--danger-l); margin-bottom:14px; display:none; }
    .err-msg.show { display:block; }
    .success-msg { background:rgba(30,158,86,.1); border:1px solid var(--success); border-radius:4px; padding:9px 12px; font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--success); margin-bottom:14px; display:none; }
    .success-msg.show { display:block; }

    .btn-submit { width:100%; padding:13px; background:var(--accent); border:none; border-radius:6px; color:#fff; font-family:'Orbitron',monospace; font-size:12px; font-weight:700; letter-spacing:4px; cursor:pointer; transition:all .2s; }
    .btn-submit:hover { background:var(--accent-b); box-shadow:0 0 20px var(--accent-glow); }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BCSO">
  <meta name="theme-color" content="#1458a0">
  <link rel="apple-touch-icon" href="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png">
</head>
<body>
<div class="box">
  <div class="logo">
    <img src="https://r2.fivemanage.com/XEcvh0aBGRYhLzNNcRsQI/logo/cussondubureaudushrifdeBlaine.png" alt="BCSO" onerror="this.style.display='none'">
    <h1>L · S · P · D</h1>
    <p>CHANGEMENT DE MOT DE PASSE</p>
  </div>

  <div class="card">
    <div class="alert-box">
      <div style="font-size:20px">🔐</div>
      <div class="alert-text">
        <strong>PREMIÈRE CONNEXION</strong>
        Veuillez choisir un nouveau mot de passe personnel avant d'accéder à l'intranet.
      </div>
    </div>

    <div class="fg">
      <label>Nouveau mot de passe</label>
      <input type="password" id="newPass" placeholder="Votre nouveau mot de passe">
    </div>

    <div class="fg">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirmPass" placeholder="Répétez le mot de passe">
    </div>

    <div class="err-msg" id="errMsg"></div>
    <div class="success-msg" id="successMsg">✓ Mot de passe changé ! Redirection...</div>

    <button class="btn-submit" id="submitBtn" onclick="changePassword()">CONFIRMER</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_kfIx8Q5d6zha5NUFNpsbR5D02d5q1DA",
    authDomain: "bcso-intranet-3d5ab.firebaseapp.com",
    projectId: "bcso-intranet-3d5ab",
    storageBucket: "bcso-intranet-3d5ab.firebasestorage.app",
    messagingSenderId: "788391241057",
    appId: "1:788391241057:web:66e876f97ee32825f01120"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let currentUser = null;

  onAuthStateChanged(auth, user => {
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;
  });

  window.changePassword = async function() {
    const newPass = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirmPass').value;
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errMsg');
    const success = document.getElementById('successMsg');

    err.classList.remove('show');

    if (!newPass || newPass.length < 6) {
      err.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
      err.classList.add('show'); return;
    }
    if (newPass !== confirm) {
      err.textContent = 'Les mots de passe ne correspondent pas.';
      err.classList.add('show'); return;
    }

    btn.disabled = true; btn.textContent = 'MISE À JOUR...';

    try {
      await updatePassword(currentUser, newPass);
      await updateDoc(doc(db, 'users', currentUser.uid), {
        forcePasswordChange: false,
        passwordChangedAt: new Date().toISOString()
      });
      success.classList.add('show');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
    } catch(e) {
      let msg = 'Erreur. Réessayez.';
      if (e.code === 'auth/requires-recent-login') msg = 'Session expirée. Reconnectez-vous.';
      err.textContent = msg;
      err.classList.add('show');
      btn.disabled = false; btn.textContent = 'CONFIRMER';
    }
  };

  document.addEventListener('keydown', e => { if (e.key === 'Enter') window.changePassword(); });
</script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/bcso-intranet/sw.js").catch(()=>{});
    }
  </script>
</body>
</html>
